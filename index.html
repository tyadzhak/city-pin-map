<!doctype html>
<!--
  City Pin Map — single-page, no-backend web app.

  PNG export library: dom-to-image-more (chosen over html-to-image for slightly
  better Leaflet/canvas-tile compatibility; see jira/core/CORE-001 notes).
  CORE-012 (PNG export) must use this same library — do not mix.

  All third-party libraries are loaded via CDN at exact pinned versions.
  Do not change to "latest" or unpinned tags (CLAUDE.md → Hard rules).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>City Pin Map</title>

    <!-- Leaflet 1.9.4 — map rendering -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- dom-to-image-more 3.5.0 — DOM → PNG export -->
    <script
      defer
      src="https://unpkg.com/dom-to-image-more@3.5.0/dist/dom-to-image-more.min.js"
    ></script>

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header" aria-label="Search">
        <h1 class="app-title">City Pin Map</h1>
        <!-- Relatively-positioned wrapper so #search-results can be
             absolutely positioned and overlay the map below the header. -->
        <div class="search">
          <label for="search-input" class="visually-hidden"
            >Search a city</label
          >
          <input
            id="search-input"
            type="search"
            class="search__input"
            placeholder="Search a city…"
            autocomplete="off"
            spellcheck="false"
            aria-controls="search-results"
            aria-autocomplete="list"
          />
          <ul
            id="search-results"
            class="search__results"
            role="listbox"
            hidden
          ></ul>
        </div>
        <label for="map-style-select" class="visually-hidden"
          >Map style</label
        >
        <!-- Options are populated at runtime from MAP_STYLES (js/map.js) so
             the registry stays the single source of truth. Keep the element
             empty here — js/app.js fills it on init. -->
        <select
          id="map-style-select"
          class="map-style-select"
          aria-label="Map style"
        ></select>
        <label class="route-toggle">
          <input
            id="route-toggle"
            type="checkbox"
            class="route-toggle__input"
          />
          <span class="route-toggle__label">Show route</span>
        </label>
        <!-- Export options live in their own panel so future controls
             (NICE-007 dimensions / aspect ratio) can be added in the same
             slot without further header gymnastics. -->
        <div class="export-options" aria-label="Export options">
          <input
            id="export-title"
            type="text"
            class="export-options__input"
            placeholder="Title (optional)"
            autocomplete="off"
            spellcheck="false"
          />
          <input
            id="export-subtitle"
            type="text"
            class="export-options__input"
            placeholder="Subtitle (optional)"
            autocomplete="off"
            spellcheck="false"
          />
          <label for="export-format" class="visually-hidden"
            >Export format</label
          >
          <!-- Preset id values are kept in sync with EXPORT_PRESETS in
               js/export.js. Keep the option strings short — the cluster
               sits next to the title/subtitle inputs and a long label
               would push the Export button off-line on smaller windows. -->
          <select
            id="export-format"
            class="export-format-select"
            aria-label="Export format"
          >
            <option value="current">Current view</option>
            <option value="square">Square 1:1 (1080×1080)</option>
            <option value="16x9">16:9 (1920×1080)</option>
            <option value="a4-portrait">A4 portrait (794×1123)</option>
            <option value="a4-landscape">A4 landscape (1123×794)</option>
          </select>
        </div>
        <button id="export-png" type="button" class="export-btn">
          Export PNG
        </button>
      </header>

      <main class="app-map" aria-label="Map">
        <div id="map"></div>
      </main>

      <aside class="app-side" aria-label="Pinned cities">
        <!-- Groups panel (NICE-004). Sits above the pins list per the
             implementation prompt; the section is its own scroll context
             so a long group list never starves the pins list below. -->
        <section class="group-panel" aria-label="Groups">
          <div class="group-panel__header">
            <h2 class="group-panel__heading">Groups</h2>
            <button id="add-group" type="button" class="group-panel__add">
              Add group
            </button>
          </div>
          <ul id="group-list" class="group-list"></ul>
          <p id="group-list-empty" class="group-list__empty">
            No groups yet — click "Add group" to create one.
          </p>
        </section>
        <h2 class="pin-list__heading">Pins</h2>
        <ul id="pin-list" class="pin-list"></ul>
        <p id="pin-list-empty" class="pin-list__empty">
          No pins yet — search for a city above.
        </p>
      </aside>
    </div>

    <div
      id="error-banner"
      class="error-banner"
      role="alert"
      aria-live="polite"
      hidden
    ></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
