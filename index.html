<!doctype html>
<!--
  City Pin Map — single-page, no-backend web app.

  PNG export library: dom-to-image-more (chosen over html-to-image for slightly
  better Leaflet/canvas-tile compatibility; see jira/core/CORE-001 notes).
  CORE-012 (PNG export) must use this same library — do not mix.

  All third-party libraries are loaded via CDN at exact pinned versions.
  Do not change to "latest" or unpinned tags (CLAUDE.md → Hard rules).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>City Pin Map</title>

    <!-- Leaflet 1.9.4 — map rendering -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- dom-to-image-more 3.5.0 — DOM → PNG export -->
    <script
      defer
      src="https://unpkg.com/dom-to-image-more@3.5.0/dist/dom-to-image-more.min.js"
    ></script>

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header" aria-label="Search">
        <h1 class="app-title">City Pin Map</h1>
        <!-- Relatively-positioned wrapper so #search-results can be
             absolutely positioned and overlay the map below the header. -->
        <div class="search">
          <label for="search-input" class="visually-hidden"
            >Search a city</label
          >
          <input
            id="search-input"
            type="search"
            class="search__input"
            placeholder="Search a city…"
            autocomplete="off"
            spellcheck="false"
            aria-controls="search-results"
            aria-autocomplete="list"
          />
          <ul
            id="search-results"
            class="search__results"
            role="listbox"
            hidden
          ></ul>
        </div>
        <label for="map-style-select" class="visually-hidden"
          >Map style</label
        >
        <!-- Options are populated at runtime from MAP_STYLES (js/map.js) so
             the registry stays the single source of truth. Keep the element
             empty here — js/app.js fills it on init. -->
        <select
          id="map-style-select"
          class="map-style-select"
          aria-label="Map style"
        ></select>
        <button id="export-png" type="button" class="export-btn">
          Export PNG
        </button>
      </header>

      <main class="app-map" aria-label="Map">
        <div id="map"></div>
      </main>

      <aside class="app-side" aria-label="Pinned cities">
        <h2 class="pin-list__heading">Pins</h2>
        <ul id="pin-list" class="pin-list"></ul>
        <p id="pin-list-empty" class="pin-list__empty">
          No pins yet — search for a city above.
        </p>
      </aside>
    </div>

    <div
      id="error-banner"
      class="error-banner"
      role="alert"
      aria-live="polite"
      hidden
    ></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
